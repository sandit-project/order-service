<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커스텀 주문</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Iamport 결제 스크립트 로드 -->
    <script src="https://cdn.iamport.kr/js/iamport.payment-1.2.0.js"></script>
    <link rel="stylesheet" th:href="@{/css/order.css}">
    <script th:src="@{/js/customOrder.js}"></script>
</head>
<body>
<h1>샌드위치 커스텀</h1>

<div id="custom-order-form">
    <h2>커스텀 샌드위치 주문</h2>

    <div>
        <label>빵 선택</label>
        <select id="bread">
            <option value="">빵을 선택하세요</option>
            <option value="플랫브레드">플랫브레드</option>
            <option value="허니오트">허니오트</option>
            <!-- 필요한 빵 추가 -->
        </select>
    </div>

    <div>
        <label>메인 재료</label>
        <input type="text" id="material1" placeholder="메인 재료 1">
        <input type="text" id="material2" placeholder="메인 재료 2">
        <input type="text" id="material3" placeholder="메인 재료 3">
    </div>

    <div>
        <label>치즈</label>
        <select id="cheese">
            <option value="">치즈 선택</option>
            <option value="아메리칸 치즈">아메리칸 치즈</option>
            <option value="슈레드 치즈">슈레드 치즈</option>
        </select>
    </div>

    <div>
        <label>야채</label>
        <input type="text" id="vegetable1" placeholder="야채 1">
        <input type="text" id="vegetable2" placeholder="야채 2">
        <input type="text" id="vegetable3" placeholder="야채 3">
        <!-- 필요한 만큼 추가 -->
    </div>

    <div>
        <label>소스</label>
        <input type="text" id="sauce1" placeholder="소스 1">
        <input type="text" id="sauce2" placeholder="소스 2">
        <input type="text" id="sauce3" placeholder="소스 3">
    </div>

    <button id="customPayButton">커스텀 결제하기</button>
</div>

<div id="totalPrice">총 결제 금액: 0원</div>

<button id="payButton">결제하기</button>
</body>
</html>
