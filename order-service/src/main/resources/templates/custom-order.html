<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커스텀 주문</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.iamport.kr/js/iamport.payment-1.2.0.js"></script>
    <script src="/js/custom-order.js"></script>
</head>
<body>

<h1>샌드위치 커스텀 주문</h1>

<form id="customOrderForm">
    <div>
        <label>빵 종류:</label>
        <select id="bread">
            <option value="화이트">화이트</option>
            <option value="허니오트">허니오트</option>
        </select>
    </div>

    <div>
        <label>메인 재료:</label>
        <select id="material1">
            <option value="닭가슴살">닭가슴살</option>
            <option value="로스트비프">로스트비프</option>
        </select>
    </div>

    <div>
        <label>치즈:</label>
        <select id="cheese">
            <option value="아메리칸치즈">아메리칸치즈</option>
            <option value="슈레드치즈">슈레드치즈</option>
        </select>
    </div>

    <div>
        <label>소스:</label>
        <select id="sauce1">
            <option value="허니머스타드">허니머스타드</option>
            <option value="스위트어니언">스위트어니언</option>
        </select>
    </div>

    <button type="button" id="customPayButton">커스텀 주문하기</button>
</form>

</body>
</html>
