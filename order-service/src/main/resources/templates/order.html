<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주문 확인 페이지</title>
</head>
<body>
<h1>주문 생성</h1>
<!-- 주문 생성 폼 -->
<form th:action="@{/orders}" method="post">
    <div>
        <label for="userUid">회원 아이디:</label>
        <input type="text" id="userUid" name="userUid" required />
    </div>
    <div>
        <label for="menuName">메뉴 이름:</label>
        <input type="text" id="menuName" name="menuName" required />
    </div>
    <div>
        <label for="amount">수량:</label>
        <input type="number" id="amount" name="amount" min="1" required />
    </div>
    <div>
        <label for="price">가격:</label>
        <input type="number" id="price" name="price" required />
    </div>
    <div>
        <label for="calorie">칼로리:</label>
        <input type="text" id="calorie" name="calorie" />
    </div>
    <div>
        <button type="submit">주문하기</button>
    </div>
</form>

<hr/>

<h1>주문 목록</h1>
<!-- 주문 목록 테이블 -->
<table border="1">
    <thead>
    <tr>
        <th>주문 ID</th>
        <th>회원 ID</th>
        <th>메뉴 이름</th>
        <th>수량</th>
        <th>가격</th>
        <th>칼로리</th>
        <th>상태</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.uid}">주문번호</td>
        <td th:text="${order.userUid}">회원아이디</td>
        <td th:text="${order.menuUid}">메뉴아이디</td>
        <td th:text="${order.amount}">수량</td>
        <td th:text="${order.price}">가격</td>
        <td th:text="${order.calorie}">칼로리</td>
        <td th:text="${order.status}">상태</td>
    </tr>
    </tbody>
</table>
</body>
</html>
