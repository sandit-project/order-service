<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주문 테스트</title>
    <!-- jQuery 로드 -->
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <!-- Iamport 결제 스크립트 로드 -->
    <script src="https://cdn.iamport.kr/js/iamport.payment-1.2.0.js"></script>
    <link rel="stylesheet" th:href="@{/css/order.css}">
    <script th:src="@{/js/order.js}"></script>
</head>
<body>
<h1>주문 테스트 페이지</h1>
    <div th:if="${menuList != null}">
    <div th:each="menu, iterStat : ${menuList}" data-menu-item>
        <input type="checkbox" class="menu-check" checked />
        <p><b th:text="${menu.menuName}">메뉴명</b></p>
        <p th:text="${menu.price + '원'}">가격</p>

        <input type="hidden" name="items[${iterStat.index}].menuName" th:value="${menu.menuName}" />
        <input type="hidden" name="items[${iterStat.index}].price" th:value="${menu.price}" />
        <input type="hidden" name="items[${iterStat.index}].calorie" th:value="${menu.calorie}" />

        <label>수량:
            <input type="number" name="items[${iterStat.index}].amount" value="1" min="0" />
        </label>
        <hr/>
    </div>
    </div>
    <label>주문자 <input type="text" id="name" /></label><br>
    <label>주소 <input type="text" id="address" /></label><br>
    <label>전화번호 <input type="text" id="tel" /></label><br>
    <label>결제수단
        <select id="payMethod">
            <option value="card">카드</option>
        </select>
    </label><br>
    <p>총 결제 금액: <span id="totalPrice">0원</span></p>
    <button type="button" id="payButton">결제하기</button>
</body>
</html>
