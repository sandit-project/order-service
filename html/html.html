<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>샌드위치 키오스크</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1 class="logo">샌드위치 키오스크</h1>
            <nav>
                <ul>
                    <li>
                        <a href="#menu">메뉴</a>
                    </li>
                    <li>
                        <a href="#order">주문 내역</a>
                    </li>
                    <li>
                        <a href="#contact">문의</a>
                    </li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="menu" class="menu">
                <h2>메뉴</h2>
                <div class="grid">
                    <article class="card">
                        <img src="sandwich1.jpg" alt="클래식 샌드위치">
                        <div class="card-content">
                            <h3>클래식 샌드위치</h3>
                            <p>신선한 재료로 만든 클래식 샌드위치</p>
                            <span class="price">₩5,000</span>
                            <button class="btn">주문하기</button>
                        </div>
                    </article>
                    <article class="card">
                        <img src="sandwich2.jpg" alt="치즈 샌드위치">
                        <div class="card-content">
                            <h3>치즈 샌드위치</h3>
                            <p>치즈가 듬뿍 들어간 맛있는 샌드위치</p>
                            <span class="price">₩6,500</span>
                            <button class="btn">주문하기</button>
                        </div>
                    </article>
                    <article class="card">
                        <img src="sandwich3.jpg" alt="베지 샌드위치">
                        <div class="card-content">
                            <h3>베지 샌드위치</h3>
                            <p>건강한 채소가 가득한 샌드위치</p>
                            <span class="price">₩5,500</span>
                            <button class="btn">주문하기</button>
                        </div>
                    </article>
                </div>
            </section>
            <section id="order" class="order">
                <h2>주문 내역</h2>
                <p>주문하신 내역이 여기에 표시됩니다.</p>
            </section>
            <section id="contact" class="contact">
                <h2>문의</h2>
                <p>문의사항은 contact@sandwichkiosk.com 으로 보내주세요.</p>
            </section>
        </main>
        <footer>
            <p>&copy; 2023 샌드위치 키오스크</p>
        </footer>
    </body>
</html>
